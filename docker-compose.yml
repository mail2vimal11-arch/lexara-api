services:
  frontend:
    image: nginx:alpine
    restart: always
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./website/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lexara-web.rule=Host(`lexara.tech`) || Host(`www.lexara.tech`)"
      - "traefik.http.routers.lexara-web.entrypoints=websecure"
      - "traefik.http.routers.lexara-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.lexara-web.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"

  api:
    build: .
    restart: always
    env_file: .env
    networks:
      - traefik-public
      - internal
    depends_on:
      - db
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lexara-api.rule=Host(`api.lexara.tech`)"
      - "traefik.http.routers.lexara-api.entrypoints=websecure"
      - "traefik.http.routers.lexara-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.lexara-api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.api-timeout.buffering.maxResponseBodyBytes=0"
      - "traefik.http.routers.lexara-api.middlewares=api-timeout"
      - "traefik.http.services.lexara-api.loadbalancer.responseforwarding.flushinterval=1s"
      - "traefik.docker.network=traefik-public"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER:-lexara}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD:-lexara123}
      POSTGRES_DB: ${POSTGRES_DB_NAME:-lexaradb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  hf-warmer:
    image: curlimages/curl:latest
    restart: always
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          curl -sf -X POST "https://api-inference.huggingface.co/models/$${HF_MODEL_ID}" \
            -H "Authorization: Bearer $${HF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"inputs":"Classify this clause.","parameters":{"max_new_tokens":5}}' \
            > /dev/null 2>&1 && echo "$(date) model warm" || echo "$(date) warming model..."
          sleep 600
        done
    networks:
      - internal

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
